# Test configuration for hyperparam table-based config feature
# This config loads optimized hyperparameters from a CSV file while allowing
# global parameter overrides (like num_runs, T, dt)

# General configuration
num_runs: 2  # Override: fewer runs for quick testing
graph_path:  # Multiple graphs for testing (all match CSV)
  - "graphs/gset/G1.col"
  - "graphs/gset/G2.col"
out_dir: "results/"

# Wall time estimation
assumed_time_per_step_us: 150

# Hyperparam table CSV contains optimized hyperparameters for each model-graph combination 
# If specified, this table will be used for parameters not specified in config.
hyperparam_table: "../best_hyperparams/250630_prelim_max-3-cut_mean_gap.csv"

# Global simulation parameters
T: 1000        # Override: custom simulation time
dt: 1e-2       # Override: custom time step
num_states: 3  # Number of Potts states (must match CSV data)
noise_factor: 1e-4

# Model specifications
# When hyperparam_table is specified, the model-specific hyperparameters
# (like gamma_factor, r_target, etc.) are loaded from the CSV if not overridden by the config below.
models:
  NEC:
    T: [10,1000] # larger T and dt helps wrt. gain term vs. other terms
    dt: [1e-2,2e-2]
    #alpha_rate: [1e-2, 1e-5]
    gamma_schedule: # Gamma schedule as prototype multiplied by swept factor
      prototype: "lin(0,1)"
