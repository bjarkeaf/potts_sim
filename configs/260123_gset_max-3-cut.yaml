# General configuration
num_runs: 100  # Number of different seeds to run per parameter set
graph_path:
  - "graphs/gset/G1.col"
  - "graphs/gset/G2.col"
  - "graphs/gset/G3.col"
  - "graphs/gset/G4.col"
  - "graphs/gset/G5.col"
out_dir: "results/"  # Directory to save results

# Wall time estimation
assumed_time_per_step_us: 400 # Assumed time between steps in microseconds

# Global simulation parameters (can be overridden per model)
T: 100         # Total simulation time
dt: 1e-2       # Time step
num_states: 3  # Number of Potts states
noise_factor: 1e-4  # Noise scaling

# Parameter sweeps for each model type
models:
  NEC:
    T: 5e3 # larger T and dt helps wrt. gain term vs. other terms
    dt: 1e-2
    alpha_rate: [1e-2]
    r_target: "1.5:0.1:2.5"
    initial_alpha: "-mu_max"  # Will be evaluated for each graph
    gamma_schedule: # Gamma schedule as prototype multiplied by swept factor
      prototype: "lin(0,1)"
      factor: "1:0.5:15"

  QPDC:
    T: 1000
    dt: 1e-3
    poly_order: ["2*num_states - 1"]
    beta_schedule: ["const(1/(1+num_edges/num_vertices))"] # Will be evaluated for each graph
    gamma_schedule:
      prototype: "linspan(0, T)"  # slope = factor (time-invariant)
      factor: "0:0.04:2*gamma_th"  # slope from 0 to 2*gamma_th in steps of 0.04

  FIXED_AMPLITUDE:
    T: 1000
    dt: 1e-3
    gamma_schedule: ["lin(0,10.0)"]

  POLYNOMIAL:
    T: 1000
    dt: 1e-3
    poly_order: "3:1:10"
    beta_schedule: ["lin(1/mu_max, 1/mu_max + 2)"]  # Linear ramp starting at threshold 1/mu_max
    gamma_schedule: # Gamma defined as a factor times beta
      based_on: "beta_schedule"
      factor: "0:0.2:5" # Matlab style: start:step:end

  SIGMOID:
    T: 2000 # The lower alpha, the longer it takes to converge
    dt: 1e-3
    alpha: "-50:10:0"
    beta_schedule: ["lin((1-alpha)/mu_max, (1-alpha)/mu_max + 20)"]
    gamma_schedule:
      based_on: "beta_schedule"
      factor: "0:0.5:8"

  CIM:
    T: 1000
    dt: 1e-2
    alpha: [-50]
    beta_schedule: ["lin(0,0.01)"]
    B_num_vertices: "100:10:200"  # B = B_num_vertices / num_vertices
    zeta: "0.4:0.05:0.7"
