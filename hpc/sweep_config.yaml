# General configuration
num_runs: 100  # Number of different seeds to run per parameter set
graph_path: "graphs/band/"  # Can be a directory or single file
out_dir: "results/"  # Directory to save results

# Simulation parameters
T: 1000         # Total simulation time
dt: 1e-3        # Time step
num_states: 3   # Number of Potts states
noise_factor: 1e-4  # Noise scaling

# Parameter sweeps for each model type
models:
  POLYNOMIAL:
    poly_order: [3, 5]  # Order of polynomial model
    # Beta and gamma schedules use string notation that will be parsed
    beta_schedule: ["lin(0,1.0)", "lin(0,2.0)"]  # Linear ramp from start to end
    gamma_schedule: ["lin(0,2.0)", "lin(0,4.0)"]  # Linear ramp from start to end
  
  NEC:
    alpha_rate: [1e-2, 5e-2]
    gamma: [0.5, 1.0, 2.0]
    r_target: [1.5, 2.0]
    # initial_alpha_arr will be generated with these values for all spins
    initial_alpha: [0.5, 1.0]  
  
  SIGMOID:
    alpha: [-0.5, -1.0, -2.0]
    beta_schedule: ["lin(0,1.0)"]
    gamma_schedule: ["lin(0,2.0)"]
  
  FIXED_AMPLITUDE:
    gamma_schedule: ["lin(0,2.0)", "lin(0,3.0)"]
