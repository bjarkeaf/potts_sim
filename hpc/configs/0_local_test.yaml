num_runs: 10  # Small number of runs for quick testing
graph_path:
  - "graphs/band/band250_3_antiferro.col"
  - "graphs/band/band200_3_antiferro.col"
out_dir: "results"

# Global simulation parameters
T: 10.0
dt: 1e-3
num_states: 3
noise_factor: 1e-4

models:
  # Single model demonstrating all features
  POLYNOMIAL:
    T: 100.0
    
    # Single value parameter
    poly_order: [3]
    
    # Schedule using mu_max in expression
    beta_schedule: ["lin(1/mu_max, 1.0)"]
    
    # Linked schedule with MATLAB-style range for factor
    gamma_schedule:
      based_on: "beta_schedule"
      factor: "1:0.5:2"  # Creates values [1.0, 1.5, 2.0]
