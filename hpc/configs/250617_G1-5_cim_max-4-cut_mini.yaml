# General configuration
num_runs: 4  # Number of different seeds to run per parameter set
graph_path: "graphs/gset/G1-5/"  # Directory, file, or multiple directories/files
out_dir: "results/"  # Directory to save results

# Wall time estimation
assumed_time_per_step_us: 15000 # Assumed time between steps in microseconds

# Global simulation parameters (can be overridden per model)
T: 1e3         # Total simulation time
dt: 1e-2       # Time step
num_states: 4  # Number of Potts states
noise_factor: 1e-4  # Noise scaling

# Parameter sweeps for each model type
models:
  CIM:
    alpha: [-10]
    beta_schedule: ["lin(0,0.02)"]
    B_num_vertices: "25:25:300" # B * num_vertices, so B = B_num_vertices / num_vertices
    zeta: "0.25:0.25:2"
