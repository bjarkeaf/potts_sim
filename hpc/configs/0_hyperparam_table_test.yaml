# Test configuration for hyperparam table-based config feature
# This config loads optimized hyperparameters from a CSV file while allowing
# global parameter overrides (like num_runs, T, dt)

# General configuration
num_runs: 1  # Override: fewer runs for quick testing
graph_path:  # Multiple graphs for testing (all match CSV)
  - "graphs/gset/G1.col"
  - "graphs/gset/G2.col"
out_dir: "results/"

# Wall time estimation
assumed_time_per_step_us: 300

# IMPORTANT: Path to hyperparam table CSV (relative to this config file)
# The CSV contains optimized hyperparameters for each model-graph combination
hyperparam_table: "../best_hyperparams/250623_prelim_max-3-cut_mean_gap.csv"

# Global simulation parameters (override CSV values)
# These parameters take precedence over any values in the CSV
T: 1000        # Override: custom simulation time
dt: 1e-3       # Override: custom time step
num_states: 3  # Number of Potts states (must match CSV data)
noise_factor: 1e-4

# Model specifications
# When hyperparam_table is specified, the model-specific hyperparameters
# (like gamma_factor, r_target, etc.) are loaded from the CSV.
# You can leave the model sections empty or include only global overrides.
models:
  NEC:
    T: 5e3 # larger T and dt helps wrt. gain term vs. other terms
    dt: 1e-2
    alpha_rate: [1e-5,1e-1]
    r_target: "1.5:0.1:2.5"
    initial_alpha: "-mu_max"  # Will be evaluated for each graph
    gamma_schedule: # Gamma schedule as prototype multiplied by swept factor
      prototype: "lin(0,1)"
      factor: "1:1:5"
