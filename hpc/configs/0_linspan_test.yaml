num_runs: 5
graph_path: ["graphs/band/band200_3_antiferro.col"]
out_dir: "results/"
T: 10
dt: 1e-3
num_states: 3

models:
  # Test Feature 1: Single-line linspan notation
  POLYNOMIAL:
    T: 50
    poly_order: [3]
    beta_schedule: ["linspan(1/mu_max, 2)"]
    gamma_schedule: ["lin(0,1)"]

  # Test Feature 2: YAML dict with span sweep
  SIGMOID:
    T: 100
    alpha: [-1.0]
    beta_schedule:
      start: "1/mu_max"
      span: "1:1:3"  # Should generate 3 schedules
    gamma_schedule: ["lin(0,1)"]

  # Test combination: linspan with span list
  NEC:
    T: 100
    poly_order: 3
    alpha_rate: [1e-2]
    r_target: [2.0]
    initial_alpha: "-mu_max"
    gamma_schedule:
      start: "0"
      span: [5, 10, 15]
